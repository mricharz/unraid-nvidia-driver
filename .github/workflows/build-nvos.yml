name: Build NVOS Driver Package

on:
  workflow_dispatch:
    inputs:
      driver_version:
        description: 'NVIDIA driver version (e.g. 595.45.04)'
        required: true
        default: '595.45.04'
      kernel_version:
        description: 'Unraid kernel version (e.g. 6.12.54-Unraid)'
        required: true
        default: '6.12.54-Unraid'
      gcc_tag:
        description: 'GCC container tag from ghcr.io/ich777/unraid_kernel'
        required: true
        default: 'gcc_14.2.0'

jobs:
  build-nvos:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      - name: Create output directory
        run: mkdir -p output

      - name: Build NVOS package in container
        run: |
          docker pull ghcr.io/ich777/unraid_kernel:${{ inputs.gcc_tag }}
          docker run --rm \
            --entrypoint bash \
            -v "$GITHUB_WORKSPACE":/workspace \
            -v "$GITHUB_WORKSPACE/output":/output \
            ghcr.io/ich777/unraid_kernel:${{ inputs.gcc_tag }} \
            -c '
              set -euo pipefail

              DRIVER_VERSION="${{ inputs.driver_version }}"
              KERNEL_VERSION="${{ inputs.kernel_version }}"

              echo "=== Building nvos-${DRIVER_VERSION} for kernel ${KERNEL_VERSION} ==="

              # Set required environment variables (normally set by container entrypoint)
              export UNAME="${KERNEL_VERSION}"
              export CPU_COUNT="$(nproc)"
              export DATA_DIR="/tmp/nvidia-build"
              mkdir -p "${DATA_DIR}"

              # ---------------------------------------------------------------
              # Step 1: Prepare kernel sources
              # ---------------------------------------------------------------
              echo "=== Downloading kernel sources ==="
              KERNEL_TAR="linux-${KERNEL_VERSION}.tar.xz"
              KERNEL_URL="https://github.com/ich777/unraid_kernel/releases/download/${KERNEL_VERSION}/${KERNEL_TAR}"
              wget -q -O "/tmp/${KERNEL_TAR}" "${KERNEL_URL}"
              mkdir -p "/usr/src/linux-${KERNEL_VERSION}"
              tar xf "/tmp/${KERNEL_TAR}" -C "/usr/src/linux-${KERNEL_VERSION}"
              cd "/usr/src/linux-${KERNEL_VERSION}"

              echo "=== Preparing kernel headers ==="
              make oldconfig </dev/null 2>&1 | tail -5
              make modules_prepare -j${CPU_COUNT} 2>&1 | tail -5

              # Create symlink so nvidia-installer can find kernel sources
              mkdir -p "/lib/modules/${UNAME}"
              ln -sf "/usr/src/linux-${KERNEL_VERSION}" "/lib/modules/${UNAME}/build"
              ln -sf "/usr/src/linux-${KERNEL_VERSION}" "/lib/modules/${UNAME}/source"
              cd /

              # ---------------------------------------------------------------
              # Step 2: Create makepkg shim (bzroot not extracted in CI)
              # ---------------------------------------------------------------
              mkdir -p "${DATA_DIR}/bzroot-extracted-${UNAME}/sbin"
              printf "#!/bin/bash\n# Grab last argument as output file\nfor PKG; do true; done\ntar cJf \"\${PKG}\" . 2>/dev/null; exit 0\n" > "${DATA_DIR}/bzroot-extracted-${UNAME}/sbin/makepkg"
              chmod +x "${DATA_DIR}/bzroot-extracted-${UNAME}/sbin/makepkg"

              # ---------------------------------------------------------------
              # Step 3: Build using compile.sh
              # ---------------------------------------------------------------
              echo "=== Loading compile.sh and building ==="
              cd /workspace

              # Wrap wget to suppress progress spam from compile.sh
              real_wget="$(which wget)"
              mkdir -p /usr/local/bin
              printf "#!/bin/bash\nexec ${real_wget} \"\${@/--show-progress/}\"" > /usr/local/bin/wget
              chmod +x /usr/local/bin/wget

              # Source compile.sh to load the nvidia_driver() function.
              # compile.sh lines 6-9 check $1 is not empty (exit 1 if missing).
              # Lines 11-17 fetch versions.json and extract runtime versions.
              # Lines 19-167 define nvidia_driver() but never call it.
              source source/compile.sh "${DRIVER_VERSION}" "opensource"

              # Call the build function
              nvidia_driver "${DRIVER_VERSION}" "opensource"

              # ---------------------------------------------------------------
              # Step 4: Copy output artifacts
              # ---------------------------------------------------------------
              echo "=== Copying build artifacts ==="
              find /tmp -name "nvos-*.txz" -exec cp {} /output/ \;
              find /tmp -name "nvos-*.txz.md5" -exec cp {} /output/ \;

              echo "=== Build artifacts ==="
              ls -la /output/
            '

      - name: Verify build output
        run: |
          echo "=== Checking output ==="
          ls -la output/
          if [ -z "$(ls output/nvos-*.txz 2>/dev/null)" ]; then
            echo "ERROR: No .txz package found in output!"
            exit 1
          fi
          echo "=== MD5 verification ==="
          cd output
          for f in *.txz; do
            if [ -f "${f}.md5" ]; then
              EXPECTED="$(cat "${f}.md5")"
              ACTUAL="$(md5sum "${f}" | awk '{print $1}')"
              echo "${f}: expected=${EXPECTED} actual=${ACTUAL}"
              if [ "${EXPECTED}" != "${ACTUAL}" ]; then
                echo "CHECKSUM MISMATCH!"
                exit 1
              fi
              echo "Checksum OK"
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nvos-${{ inputs.driver_version }}-${{ inputs.kernel_version }}
          path: output/*
          retention-days: 90

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.kernel_version }}"
          # Create release if it doesn't exist
          gh release view "${TAG}" --repo ${{ github.repository }} >/dev/null 2>&1 || \
            gh release create "${TAG}" --repo ${{ github.repository }} \
              --title "Drivers for kernel ${TAG}" \
              --notes "NVIDIA driver packages for Unraid kernel ${TAG}"
          # Upload assets (overwrite if they exist)
          for f in output/*; do
            gh release upload "${TAG}" "${f}" --repo ${{ github.repository }} --clobber
          done
          echo "=== Release ${TAG} updated ==="
          gh release view "${TAG}" --repo ${{ github.repository }}
